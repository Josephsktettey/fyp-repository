<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYP Repository | Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-book-open"></i>
                <span>FYP Repository</span>
            </div>
            <button class="hamburger" id="hamburger">
    <i class="fas fa-bars"></i>
</button>
<div class="nav-links" id="nav-links">
    <a href="index.html">Home</a>
    <a href="browse.html">Browse</a>
    <a href="login.html">Login</a>
    <a href="register.html" class="btn-primary">Register</a>
</div>
        </div>
    </nav>

    <!-- LOGIN SECTION -->
    <section class="auth-section">
        <div class="auth-container">
            <div class="auth-header">
                <i class="fas fa-lock"></i>
                <h2>Welcome Back</h2>
                <p>Login to access your account</p>
            </div>
            <div class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="Enter your password">
                </div>
                <div id="error-message" class="error-message"></div>
                <div id="success-message" class="success-message"></div>            
                <button class="btn-primary btn-full" onclick="loginUser()">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <p class="auth-redirect">
    <button class="forgot-password-btn" onclick="forgotPassword()">Forgot Password?</button>
</p>
<p class="auth-redirect">
    Don't have an account? <a href="register.html">Register here</a>
</p>
            </div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 FYP Repository. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
