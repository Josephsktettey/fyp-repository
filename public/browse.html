<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FYP Repository | Browse Topics</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- NAVIGATION -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-book-open"></i>
                <span>FYP Repository</span>
            </div>
            <button class="hamburger" id="hamburger">
    <i class="fas fa-bars"></i>
</button>
            <div class="nav-links" id="nav-links">
                <a href="index.html">Home</a>
                <a href="browse.html">Browse</a>
                <a href="login.html">Login</a>
                <a href="register.html" class="btn-primary">Register</a>
            </div>
        </div>
    </nav>

    <!-- BROWSE SECTION -->
    <section class="browse-section">
        <div class="container">

            <!-- HEADER -->
            <div class="browse-header">
                <div>
                    <h2>Browse All Project Topics</h2>
                    <p id="topics-count">Loading topics...</p>
                </div>
            </div>

            <!-- FILTERS -->
            <div class="browse-filters">
                <input type="text" id="browseSearch" placeholder="Search by title or keyword..." oninput="filterBrowse()">
                <select id="browseYear" onchange="filterBrowse()">
                    <option value="">All Years</option>
                    <option value="Historical">Historical</option>
                    <option value="2023/2024">2023/2024</option>
                    <option value="2024/2025">2024/2025</option>
                    <option value="2025/2026">2025/2026</option>
                </select>
                <select id="browseStatus" onchange="filterBrowse()">
                    <option value="">All Status</option>
                    <option value="approved">Approved</option>
                    <option value="pending">Pending</option>
                    <option value="rejected">Rejected</option>
                </select>
            </div>

            <!-- TOPICS TABLE -->
            <div class="table-container">
                <table class="topics-table">
                    <thead>
                        <tr>
                            <th>S/No</th>
                            <th>Project Title</th>
                            <th>Department</th>
                            <th>Year</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="browse-table-body">
                        <tr>
                            <td colspan="5" class="loading-text">Loading topics...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- PAGINATION -->
            <div class="pagination" id="pagination"></div>

        </div>
    </section>

    <!-- FOOTER -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2025 FYP Repository. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
